<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head_admin :: adminHead('Categorías - Eco Agua')"></head>

<body>

<div class="app-layout" th:with="activePage='categories'">
    <!-- Sidebar -->
    <aside th:replace="fragments/sidebar :: sidebar"></aside>

    <!-- Main -->
    <div class="main-content">
        <!-- Topbar -->
        <header th:replace="fragments/topbar :: topbar"></header>

        <!-- Content -->
        <main class="content-wrapper">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="h5 mb-0">Categorías</h1>

                <div class="d-flex gap-2">
                    <button id="btnBulkDelete"
                            class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-trash"></i> Eliminar seleccionadas
                    </button>

                    <button class="btn btn-primary btn-sm"
                            data-bs-toggle="modal"
                            data-bs-target="#categoryModal">
                        <i class="bi bi-plus-lg"></i> Agregar
                    </button>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <table id="categoriesTable"
                           class="table table-striped table-sm align-middle"
                           style="width:100%">
                        <thead class="table-light">
                        <tr>
                            <th><input type="checkbox" id="checkAll"/></th>
                            <th>#</th>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Tipo</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="category, stat : ${categories}">
                            <td>
                                <input type="checkbox"
                                       class="row-check"
                                       th:value="${category.id}"/>
                            </td>
                            <td th:text="${stat.index + 1}">1</td>
                            <td th:text="${category.name}">Agua de mesa</td>
                            <td th:text="${category.description}">Descripción</td>
                            <td th:text="${category.type.label}">
                                Producto
                            </td>
                            <td class="text-center">
                                <button type="button"
                                        class="btn btn-sm btn-outline-primary me-1"
                                        data-bs-toggle="modal"
                                        data-bs-target="#categoryModal"
                                        th:attr="data-id=${category.id},
                                                 data-name=${category.name},
                                                 data-description=${category.description},
                                                 data-type=${category.type}">
                                    <i class="bi bi-pencil"></i>
                                </button>

                                <form th:action="@{'/admin/categories/' + ${category.id} + '/delete'}"
                                      method="post" class="d-inline delete-form-single">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit"
                                            class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>

<!-- Modal create/edit category -->
<div class="modal fade" id="categoryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form id="categoryForm" th:action="@{/admin/categories/save}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">Nueva categoría</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"
                            aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="id" id="categoryId"/>

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input class="form-control" name="name" id="categoryName" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <input class="form-control" name="description" id="categoryDescription">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tipo</label>
                        <select class="form-select" name="type" id="categoryType" required>
                            <option value="">- Seleccione -</option>
                            <option th:each="t : ${T(com.ecoamazonas.eco_agua.category.CategoryType).values()}"
                                    th:value="${t}"
                                    th:text="${t.label}">
                                Tipo
                            </option>
                        </select>
                    </div>

                </div>
                <div class="modal-footer">
                    <button type="button"
                            class="btn btn-secondary btn-sm"
                            data-bs-dismiss="modal">Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary btn-sm">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Scripts comunes -->
<th:block th:replace="fragments/scripts_admin :: adminScripts"></th:block>

<!-- JS específico de la vista -->
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function () {
        'use strict';

        // Init DataTable
        window.ecoAdmin.initStandardDataTable('#categoriesTable', [0, 5]);

        // Check-all, delete, bulk delete
        window.ecoAdmin.registerCheckAll('#checkAll', '.row-check');
        window.ecoAdmin.registerSingleDelete('.delete-form-single', '¿Eliminar esta categoría?');

        window.ecoAdmin.registerBulkDelete({
            triggerSelector: '#btnBulkDelete',
            checkboxSelector: '.row-check',
            deleteUrl: /*[[@{/admin/categories/bulk-delete}]]*/ '',
            csrfParam: /*[[${_csrf.parameterName}]]*/ '_csrf',
            csrfToken: /*[[${_csrf.token}]]*/ '',
            emptyMessage: 'Selecciona al menos una categoría para eliminar.',
            confirmTitle: '¿Eliminar categorías seleccionadas?',
            confirmTextBuilder: function (count) {
                return 'Se eliminarán ' + count + ' categorías.';
            }
        });

        const modal = document.getElementById('categoryModal');
        const form = document.getElementById('categoryForm');

        if (modal) {
            modal.addEventListener('show.bs.modal', function (event) {
                const button = event.relatedTarget;
                if (!button) {
                    return;
                }

                const id = button.getAttribute('data-id');

                if (id) {
                    modal.querySelector('.modal-title').textContent = 'Editar categoría';

                    document.getElementById('categoryId').value = id;
                    document.getElementById('categoryName').value =
                        button.getAttribute('data-name') || '';
                    document.getElementById('categoryDescription').value =
                        button.getAttribute('data-description') || '';
                    document.getElementById('categoryType').value =
                        button.getAttribute('data-type') || '';
                } else {
                    modal.querySelector('.modal-title').textContent = 'Nueva categoría';
                    form.reset();
                    document.getElementById('categoryId').value = '';
                }
            });
        }

        const flashMessage = /*[[${message}]]*/ null;
        const flashType = /*[[${messageType}]]*/ null;

        // Only show flash message when there is a real non-empty message
        if (
            flashMessage !== null &&
            typeof flashMessage !== "undefined" &&
            String(flashMessage).trim() !== "" &&
            String(flashMessage).toLowerCase() !== "null"
        ) {
            window.ecoAdmin.showFlashMessage(flashMessage, flashType || "success");
        }
    });
</script>

</body>
</html>
