<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head_admin :: adminHead('Perfiles (clientes) - Eco Agua')"></head>

<body>

<div class="app-layout" th:with="activePage='client-profiles'">
    <!-- Sidebar -->
    <aside th:replace="fragments/sidebar :: sidebar"></aside>

    <!-- Main -->
    <div class="main-content">

        <!-- Topbar -->
        <header th:replace="fragments/topbar :: topbar"></header>

        <!-- Content -->
        <main class="content-wrapper">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="h5 mb-0">Perfiles (clientes)</h1>

                <div class="d-flex gap-2">
                    <button id="btnBulkDelete"
                            class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-trash"></i> Eliminar seleccionados
                    </button>

                    <button class="btn btn-primary btn-sm"
                            data-bs-toggle="modal"
                            data-bs-target="#profileModal">
                        <i class="bi bi-plus-lg"></i> Agregar
                    </button>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <table id="profilesTable"
                           class="table table-striped table-sm align-middle"
                           style="width:100%">
                        <thead class="table-light">
                        <tr>
                            <th>
                                <input type="checkbox" id="checkAll"/>
                            </th>
                            <th>#</th>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th class="text-end">Precio sugerido S/.</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="profile, stat : ${profiles}">
                            <td>
                                <input type="checkbox"
                                       class="row-check"
                                       th:value="${profile.id}"/>
                            </td>
                            <td th:text="${stat.index + 1}">1</td>
                            <td th:text="${profile.name}">Bodega</td>
                            <td th:text="${profile.description}">Bodegas de barrio</td>
                            <td class="text-end"
                                th:text="${#numbers.formatDecimal(profile.suggestedPrice,1,'POINT',2,'POINT')}">
                                0.00
                            </td>
                            <td class="text-center">
                                <button type="button"
                                        class="btn btn-sm btn-outline-primary me-1"
                                        data-bs-toggle="modal"
                                        data-bs-target="#profileModal"
                                        th:attr="data-id=${profile.id},
                                                 data-name=${profile.name},
                                                 data-description=${profile.description},
                                                 data-price=${profile.suggestedPrice}">
                                    <i class="bi bi-pencil"></i>
                                </button>

                                <form th:action="@{'/admin/client-profiles/' + ${profile.id} + '/delete'}"
                                      method="post" class="d-inline delete-form-single">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit"
                                            class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>

<!-- Modal create/edit -->
<div class="modal fade" id="profileModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form id="profileForm" th:action="@{/admin/client-profiles/save}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">Nuevo perfil</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"
                            aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="id" id="profileId"/>

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input class="form-control" name="name" id="profileName" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <input class="form-control" name="description" id="profileDescription">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Precio sugerido S/.</label>
                        <input class="form-control" type="number" step="0.01" min="0"
                               name="suggestedPrice" id="profilePrice" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button"
                            class="btn btn-secondary btn-sm"
                            data-bs-dismiss="modal">Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary btn-sm">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Scripts comunes -->
<th:block th:replace="fragments/scripts_admin :: adminScripts"></th:block>

<!-- JS específico de la vista -->
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function () {
        // Init DataTable with standard configuration
        window.ecoAdmin.initStandardDataTable('#profilesTable', [0, 5]);

        // Register check-all and single delete
        window.ecoAdmin.registerCheckAll('#checkAll', '.row-check');
        window.ecoAdmin.registerSingleDelete('.delete-form-single', '¿Eliminar este perfil?');

        // Register bulk delete
        window.ecoAdmin.registerBulkDelete({
            triggerSelector: '#btnBulkDelete',
            checkboxSelector: '.row-check',
            deleteUrl: /*[[@{/admin/client-profiles/bulk-delete}]]*/ '',
            csrfParam: /*[[${_csrf.parameterName}]]*/ '_csrf',
            csrfToken: /*[[${_csrf.token}]]*/ '',
            emptyMessage: 'Selecciona al menos un perfil para eliminar.',
            confirmTitle: '¿Eliminar perfiles seleccionados?',
            confirmTextBuilder: function (count) {
                return 'Se eliminarán ' + count + ' perfiles.';
            }
        });

        // Modal create/edit
        const profileModal = document.getElementById('profileModal');
        const profileForm = document.getElementById('profileForm');

        if (profileModal) {
            profileModal.addEventListener('show.bs.modal', function (event) {
                const button = event.relatedTarget;
                if (!button) {
                    return;
                }

                const id = button.getAttribute('data-id');

                if (id) {
                    profileModal.querySelector('.modal-title').textContent = 'Editar perfil';
                    document.getElementById('profileId').value = id;
                    document.getElementById('profileName').value =
                        button.getAttribute('data-name') || '';
                    document.getElementById('profileDescription').value =
                        button.getAttribute('data-description') || '';
                    document.getElementById('profilePrice').value =
                        button.getAttribute('data-price') || '';
                } else {
                    profileModal.querySelector('.modal-title').textContent = 'Nuevo perfil';
                    profileForm.reset();
                    document.getElementById('profileId').value = '';
                }
            });
        }

        // Flash message from controller
        const flashMessage = /*[[${message}]]*/ null;
        const flashType = /*[[${messageType}]]*/ null;
        window.ecoAdmin.showFlashMessage(flashMessage, flashType);
    });
</script>

</body>
</html>
