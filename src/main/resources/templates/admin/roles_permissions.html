<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head_admin :: adminHead('Roles y permisos - Eco Agua')"></head>

<body>
<div class="app-layout" th:with="activePage='admin_roles_permissions'">
    <!-- Sidebar -->
    <aside th:replace="fragments/sidebar :: sidebar"></aside>

    <!-- Main -->
    <div class="main-content">
        <!-- Topbar -->
        <header th:replace="fragments/topbar :: topbar"></header>

        <!-- Content -->
        <main class="content-wrapper">
            <div class="row g-3">
                <!-- Lista de roles -->
                <div class="col-md-3">
                    <div class="card shadow-sm mb-3">
                        <div class="card-header bg-light">
                            <strong>Roles</strong>
                        </div>
                        <div class="list-group list-group-flush">
                            <div th:if="${#lists.isEmpty(roles)}"
                                 class="list-group-item text-muted small">
                                No hay roles definidos.
                            </div>

                            <a th:each="r : ${roles}"
                               th:href="@{/admin/roles-permissions(roleId=${r.id})}"
                               class="list-group-item list-group-item-action"
                               th:classappend="${currentRole != null and r.id == currentRole.id} ? ' active'">
                                <!-- Role.title y Role.code -->
                                <span th:text="${r.title}">Rol</span>
                                <small class="d-block text-muted" th:text="${r.code}">code</small>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Permisos del rol seleccionado -->
                <div class="col-md-9">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div>
                            <h1 class="h5 mb-0">Roles y permisos</h1>
                            <div class="small text-muted" th:if="${currentRole != null}">
                                Editando permisos para:
                                <strong th:text="${currentRole.title}">Rol seleccionado</strong>
                                (<span th:text="${currentRole.code}">code</span>)
                            </div>
                        </div>
                    </div>

                    <div class="card shadow-sm">
                        <div class="card-body">
                            <div th:if="${currentRole == null}" class="alert alert-info mb-0">
                                No hay roles definidos en el sistema.
                            </div>

                            <div th:if="${currentRole != null}">
                                <!-- Debe coincidir con tu @PostMapping("/{roleId}/permissions") -->
                                <form th:action="@{/admin/roles-permissions/save}" method="post">                                      
                                    <input type="hidden"
                                           th:name="${_csrf.parameterName}"
                                           th:value="${_csrf.token}"/>
                                    <input type="hidden" name="roleId" th:value="${currentRole.id}"/>

                                    <div class="table-responsive">
                                        <table class="table table-sm align-middle mb-0">
                                            <thead class="table-light">
                                            <tr>
                                                <th style="width: 60px;">Asignado</th>
                                                <th>Código</th>
                                                <th>Nombre</th>
                                            </tr>
                                            </thead>
                                            <tbody>
                                            <tr th:each="perm : ${permissions}">
                                                <td>
                                                    <div class="form-check">
                                                        <input class="form-check-input"
                                                               type="checkbox"
                                                               name="permissionIds"
                                                               th:value="${perm.id}"
                                                               th:checked="${assignedPermissionIds != null and assignedPermissionIds.contains(perm.id)}">
                                                    </div>
                                                </td>
                                                <!-- Permission.code y Permission.description -->
                                                <td th:text="${perm.code}">perm.code</td>
                                                <td th:text="${perm.description}">perm.description</td>
                                            </tr>
                                            </tbody>
                                        </table>
                                    </div>

                                    <div class="mt-3 d-flex justify-content-between align-items-center">
                                        <div class="form-check">
                                            <input type="checkbox"
                                                   class="form-check-input"
                                                   id="checkAllPermissions">
                                            <label class="form-check-label" for="checkAllPermissions">
                                                Marcar / desmarcar todos
                                            </label>
                                        </div>

                                        <button type="submit" class="btn btn-primary btn-sm">
                                            Guardar cambios
                                        </button>
                                    </div>
                                </form>
                            </div>

                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>
</div>

<th:block th:replace="fragments/scripts_admin :: adminScripts"></th:block>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function () {
        'use strict';

        const checkAll = document.getElementById('checkAllPermissions');
        if (checkAll) {
            checkAll.addEventListener('change', function () {
                const checked = this.checked;
                document.querySelectorAll('input[name="permissionIds"]').forEach(function (cb) {
                    cb.checked = checked;
                });
            });
        }

        const flashMessage = /*[[${message}]]*/ null;
        const flashType = /*[[${messageType}]]*/ null;
        if (flashMessage && flashMessage !== 'null' && flashMessage !== '') {
            if (window.ecoAdmin && typeof window.ecoAdmin.showFlashMessage === 'function') {
                window.ecoAdmin.showFlashMessage(flashMessage, flashType || 'success');
            } else {
                alert(flashMessage);
            }
        }
    });
</script>

</body>
</html>
