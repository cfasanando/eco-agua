<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head_admin :: adminHead('Proveedores - Eco Agua')"></head>

<body>

<div class="app-layout" th:with="activePage='suppliers'">
    <!-- Sidebar -->
    <aside th:replace="fragments/sidebar :: sidebar"></aside>

    <!-- Main -->
    <div class="main-content">
        <!-- Topbar -->
        <header th:replace="fragments/topbar :: topbar"></header>

        <!-- Content -->
        <main class="content-wrapper">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="h5 mb-0">Proveedores</h1>

                <div class="d-flex gap-2">
                    <button id="btnSuppliersBulkDelete"
                            class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-trash"></i> Eliminar seleccionados
                    </button>

                    <button class="btn btn-primary btn-sm"
                            data-bs-toggle="modal"
                            data-bs-target="#supplierModal">
                        <i class="bi bi-plus-lg"></i> Agregar
                    </button>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <table id="suppliersTable"
                           class="table table-striped table-sm align-middle"
                           style="width:100%">
                        <thead class="table-light">
                        <tr>
                            <th><input type="checkbox" id="suppliersCheckAll"/></th>
                            <th>#</th>
                            <th>Nombre o razón social</th>
                            <th>Documento</th>
                            <th>Dirección</th>
                            <th>Celular o teléfono</th>
                            <th>Categoría</th>
                            <th>Contacto</th>
                            <th>Activo</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="supplier, stat : ${suppliers}">
                            <td>
                                <input type="checkbox"
                                       class="supplier-row-check"
                                       th:value="${supplier.id}"/>
                            </td>
                            <td th:text="${stat.index + 1}">1</td>

                            <td th:text="${supplier.name}">Proveedor X</td>

                            <td>
                                <span th:text="${supplier.docType}">ruc</span> :
                                <span th:text="${supplier.docNumber}">0</span>
                            </td>

                            <td th:text="${supplier.address}">Dirección</td>

                            <td th:text="${supplier.phone}">999</td>

                            <td th:text="${supplier.category != null ? supplier.category.name : '-'}">
                                Categoría
                            </td>

                            <td>
                                <span th:text="${supplier.contactName}">Contacto</span>
                                <small class="text-muted d-block"
                                       th:text="${supplier.contactPhone}">999</small>
                            </td>

                            <td>
                                <span th:if="${supplier.active}"
                                      class="badge bg-success-subtle text-success">Activo</span>
                                <span th:if="${!supplier.active}"
                                      class="badge bg-secondary-subtle text-muted">Inactivo</span>
                            </td>

                            <td class="text-center">
                                <!-- Edit button -->
                                <button type="button"
                                        class="btn btn-sm btn-outline-primary me-1"
                                        data-bs-toggle="modal"
                                        data-bs-target="#supplierModal"
                                        th:attr="data-id=${supplier.id},
                                                 data-name=${supplier.name},
                                                 data-doc-type=${supplier.docType},
                                                 data-doc-number=${supplier.docNumber},
                                                 data-address=${supplier.address},
                                                 data-phone=${supplier.phone},
                                                 data-contact-name=${supplier.contactName},
                                                 data-contact-phone=${supplier.contactPhone},
                                                 data-active=${supplier.active},
                                                 data-category-id=${supplier.category != null ? supplier.category.id : null}">
                                    <i class="bi bi-pencil"></i>
                                </button>

                                <!-- Delete button -->
                                <form th:action="@{'/admin/suppliers/' + ${supplier.id} + '/delete'}"
                                      method="post"
                                      class="d-inline supplier-delete-form-single">
                                    <input type="hidden"
                                           th:name="${_csrf.parameterName}"
                                           th:value="${_csrf.token}"/>
                                    <button type="submit"
                                            class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>

<!-- Modal create/edit supplier -->
<div class="modal fade" id="supplierModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <form id="supplierForm"
                  th:action="@{/admin/suppliers/save}"
                  method="post">
                <div class="modal-header">
                    <h5 class="modal-title">Nuevo proveedor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"
                            aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="id" id="supplierId"/>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Nombre o razón social</label>
                                <input class="form-control"
                                       name="name"
                                       id="supplierName"
                                       required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Tipo de documento</label>
                                <select class="form-select"
                                        name="docType"
                                        id="supplierDocType"
                                        required>
                                    <option value="ruc">RUC</option>
                                    <option value="dni">DNI</option>
                                    <option value="otro">Otro</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Número de documento</label>
                                <input class="form-control"
                                       name="docNumber"
                                       id="supplierDocNumber"
                                       required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Dirección</label>
                                <input class="form-control"
                                       name="address"
                                       id="supplierAddress">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Celular o teléfono</label>
                                <input class="form-control"
                                       name="phone"
                                       id="supplierPhone">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Categoría</label>
                                <select class="form-select"
                                        name="categoryId"
                                        id="supplierCategoryId">
                                    <option value="">Sin categoría</option>
                                    <option th:each="cat : ${supplierCategories}"
                                            th:value="${cat.id}"
                                            th:text="${cat.name}">
                                        Categoria
                                    </option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Contacto</label>
                                <input class="form-control"
                                       name="contactName"
                                       id="supplierContactName">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Teléfono de contacto</label>
                                <input class="form-control"
                                       name="contactPhone"
                                       id="supplierContactPhone">
                            </div>

                            <div class="form-check">
                                <input class="form-check-input"
                                       type="checkbox"
                                       value="true"
                                       id="supplierActive"
                                       name="active"
                                       checked>
                                <label class="form-check-label" for="supplierActive">
                                    Proveedor activo
                                </label>
                            </div>
                        </div>
                    </div>

                </div>
                <div class="modal-footer">
                    <button type="button"
                            class="btn btn-secondary btn-sm"
                            data-bs-dismiss="modal">Cancelar
                    </button>
                    <button type="submit"
                            class="btn btn-primary btn-sm">Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Scripts comunes -->
<th:block th:replace="fragments/scripts_admin :: adminScripts"></th:block>

<!-- JS específico de la vista -->
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function () {
        'use strict';

        // DataTable setup (no sort on first and last columns)
        window.ecoAdmin.initStandardDataTable('#suppliersTable', [0, 9]);

        // Check-all and delete helpers
        window.ecoAdmin.registerCheckAll('#suppliersCheckAll', '.supplier-row-check');
        window.ecoAdmin.registerSingleDelete('.supplier-delete-form-single', '¿Eliminar este proveedor?');

        window.ecoAdmin.registerBulkDelete({
            triggerSelector: '#btnSuppliersBulkDelete',
            checkboxSelector: '.supplier-row-check',
            deleteUrl: /*[[@{/admin/suppliers/bulk-delete}]]*/ '',
            csrfParam: /*[[${_csrf.parameterName}]]*/ '_csrf',
            csrfToken: /*[[${_csrf.token}]]*/ '',
            emptyMessage: 'Selecciona al menos un proveedor para eliminar.',
            confirmTitle: '¿Eliminar proveedores seleccionados?',
            confirmTextBuilder: function (count) {
                return 'Se eliminarán ' + count + ' proveedor(es).';
            }
        });

        // Modal create / edit supplier
        const supplierModal = document.getElementById('supplierModal');
        const supplierForm = document.getElementById('supplierForm');
        const categorySelect = document.getElementById('supplierCategoryId');

        if (supplierModal) {
            supplierModal.addEventListener('show.bs.modal', function (event) {
                const button = event.relatedTarget;
                if (!button) {
                    return;
                }

                const id = button.getAttribute('data-id');

                if (id) {
                    supplierModal.querySelector('.modal-title').textContent = 'Editar proveedor';
                    document.getElementById('supplierId').value = id;
                    document.getElementById('supplierName').value =
                        button.getAttribute('data-name') || '';
                    document.getElementById('supplierDocType').value =
                        button.getAttribute('data-doc-type') || 'ruc';
                    document.getElementById('supplierDocNumber').value =
                        button.getAttribute('data-doc-number') || '';
                    document.getElementById('supplierAddress').value =
                        button.getAttribute('data-address') || '';
                    document.getElementById('supplierPhone').value =
                        button.getAttribute('data-phone') || '';
                    document.getElementById('supplierContactName').value =
                        button.getAttribute('data-contact-name') || '';
                    document.getElementById('supplierContactPhone').value =
                        button.getAttribute('data-contact-phone') || '';

                    const activeAttr = button.getAttribute('data-active');
                    document.getElementById('supplierActive').checked =
                        activeAttr === 'true' || activeAttr === '1';

                    const categoryId = button.getAttribute('data-category-id') || '';
                    if (categorySelect) {
                        categorySelect.value = categoryId;
                    }
                } else {
                    supplierModal.querySelector('.modal-title').textContent = 'Nuevo proveedor';
                    supplierForm.reset();
                    document.getElementById('supplierId').value = '';
                    document.getElementById('supplierDocType').value = 'ruc';
                    document.getElementById('supplierActive').checked = true;
                    if (categorySelect) {
                        categorySelect.value = '';
                    }
                }
            });
        }

        // Flash message
        const flashMessage = /*[[${message}]]*/ null;
        const flashType = /*[[${messageType}]]*/ null;
        if (flashMessage && flashMessage !== 'null' && flashMessage !== '') {
            window.ecoAdmin.showFlashMessage(flashMessage, flashType);
        }
    });
</script>

</body>
</html>
