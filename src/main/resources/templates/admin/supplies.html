<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head_admin :: adminHead('Insumos - Eco Agua')"></head>

<body>

<div class="app-layout" th:with="activePage='supplies'">
    <!-- Sidebar -->
    <aside th:replace="fragments/sidebar :: sidebar"></aside>

    <!-- Main -->
    <div class="main-content">
        <!-- Topbar -->
        <header th:replace="fragments/topbar :: topbar"></header>

        <!-- Content -->
        <main class="content-wrapper">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="h5 mb-0">Insumos</h1>

                <div class="d-flex gap-2">
                    <button id="btnBulkDelete"
                            class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-trash"></i> Eliminar seleccionados
                    </button>

                    <button class="btn btn-primary btn-sm"
                            data-bs-toggle="modal"
                            data-bs-target="#supplyModal">
                        <i class="bi bi-plus-lg"></i> Agregar
                    </button>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <table id="suppliesTable"
                           class="table table-striped table-sm align-middle"
                           style="width:100%">
                        <thead class="table-light">
                        <tr>
                            <th><input type="checkbox" id="checkAll"/></th>
                            <th>#</th>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Unidad</th>
                            <th class="text-end">Cant. base</th>
                            <th class="text-end">Costo base S/.</th>
                            <th class="text-end">Stock</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="supply, stat : ${supplies}">
                            <td>
                                <input type="checkbox"
                                       class="row-check"
                                       th:value="${supply.id}"/>
                            </td>
                            <td th:text="${stat.index + 1}">1</td>
                            <td th:text="${supply.name}">Sulfato de aluminio</td>
                            <td th:text="${supply.description}">Descripción</td>
                            <td th:text="${supply.unit}">gramo</td>
                            <td class="text-end"
                                th:text="${#numbers.formatDecimal(supply.baseQuantity,1,'POINT',4,'POINT')}">
                                0.0000
                            </td>
                            <td class="text-end"
                                th:text="${#numbers.formatDecimal(supply.baseCost,1,'POINT',2,'POINT')}">
                                0.00
                            </td>
                            <td class="text-end"
                                th:text="${#numbers.formatDecimal(supply.stock,1,'POINT',2,'POINT')}">
                                0.00
                            </td>
                            <td>
                                <span th:if="${supply.active}" class="badge bg-success-subtle text-success">Activo</span>
                                <span th:if="${!supply.active}" class="badge bg-secondary-subtle text-muted">Inactivo</span>
                            </td>
                            <td class="text-center">
                                <button type="button"
                                        class="btn btn-sm btn-outline-primary me-1"
                                        data-bs-toggle="modal"
                                        data-bs-target="#supplyModal"
                                        th:attr="data-id=${supply.id},
                                                 data-name=${supply.name},
                                                 data-description=${supply.description},
                                                 data-unit=${supply.unit},
                                                 data-base-qty=${supply.baseQuantity},
                                                 data-base-cost=${supply.baseCost},
                                                 data-stock=${supply.stock},
                                                 data-active=${supply.active}">
                                    <i class="bi bi-pencil"></i>
                                </button>

                                <form th:action="@{'/admin/supplies/' + ${supply.id} + '/delete'}"
                                      method="post" class="d-inline delete-form-single">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit"
                                            class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>

<!-- Modal create/edit supply -->
<div class="modal fade" id="supplyModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form id="supplyForm" th:action="@{/admin/supplies/save}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">Nuevo insumo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"
                            aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="id" id="supplyId"/>

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input class="form-control" name="name" id="supplyName" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea class="form-control" name="description"
                                  id="supplyDescription" rows="2"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Unidad</label>
                        <input class="form-control" name="unit" id="supplyUnit"
                               placeholder="gramo, unidad, litro..." required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Cantidad base</label>
                        <input class="form-control" type="number" step="0.0001" min="0"
                               name="baseQuantity" id="supplyBaseQty" required>
                        <div class="form-text">
                            Cantidad que corresponde al costo base (por ejemplo 1000 gramos).
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Costo base S/.</label>
                        <input class="form-control" type="number" step="0.01" min="0"
                               name="baseCost" id="supplyBaseCost" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Stock</label>
                        <input class="form-control" type="number" step="0.01" min="0"
                               name="stock" id="supplyStock">
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="true"
                               id="supplyActive" name="active" checked>
                        <label class="form-check-label" for="supplyActive">
                            Insumo activo
                        </label>
                    </div>

                </div>
                <div class="modal-footer">
                    <button type="button"
                            class="btn btn-secondary btn-sm"
                            data-bs-dismiss="modal">Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary btn-sm">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Scripts comunes -->
<th:block th:replace="fragments/scripts_admin :: adminScripts"></th:block>

<!-- JS específico de la vista -->
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function () {
        // Initialize DataTable (no ordenable: checkbox y acciones)
        window.ecoAdmin.initStandardDataTable('#suppliesTable', [0, 9]);

        // Check-all y eliminar (single/bulk)
        window.ecoAdmin.registerCheckAll('#checkAll', '.row-check');
        window.ecoAdmin.registerSingleDelete('.delete-form-single', '¿Eliminar este insumo?');

        window.ecoAdmin.registerBulkDelete({
            triggerSelector: '#btnBulkDelete',
            checkboxSelector: '.row-check',
            deleteUrl: /*[[@{/admin/supplies/bulk-delete}]]*/ '',
            csrfParam: /*[[${_csrf.parameterName}]]*/ '_csrf',
            csrfToken: /*[[${_csrf.token}]]*/ '',
            emptyMessage: 'Selecciona al menos un insumo para eliminar.',
            confirmTitle: '¿Eliminar insumos seleccionados?',
            confirmTextBuilder: function (count) {
                return 'Se eliminarán ' + count + ' insumos.';
            }
        });

        // Modal: rellenar datos al editar / limpiar al crear
        const supplyModal = document.getElementById('supplyModal');
        const supplyForm = document.getElementById('supplyForm');

        if (supplyModal) {
            supplyModal.addEventListener('show.bs.modal', function (event) {
                const button = event.relatedTarget;
                if (!button) {
                    return;
                }

                const id = button.getAttribute('data-id');

                if (id) {
                    supplyModal.querySelector('.modal-title').textContent = 'Editar insumo';

                    document.getElementById('supplyId').value = id;
                    document.getElementById('supplyName').value =
                        button.getAttribute('data-name') || '';
                    document.getElementById('supplyDescription').value =
                        button.getAttribute('data-description') || '';
                    document.getElementById('supplyUnit').value =
                        button.getAttribute('data-unit') || '';
                    document.getElementById('supplyBaseQty').value =
                        button.getAttribute('data-base-qty') || '';
                    document.getElementById('supplyBaseCost').value =
                        button.getAttribute('data-base-cost') || '';
                    document.getElementById('supplyStock').value =
                        button.getAttribute('data-stock') || '';

                    const activeAttr = button.getAttribute('data-active');
                    document.getElementById('supplyActive').checked =
                        activeAttr === 'true' || activeAttr === '1';
                } else {
                    supplyModal.querySelector('.modal-title').textContent = 'Nuevo insumo';
                    supplyForm.reset();
                    document.getElementById('supplyId').value = '';
                    document.getElementById('supplyActive').checked = true;
                }
            });
        }

        // Flash message (message, messageType vienen del controller)
        const flashMessage = /*[[${message}]]*/ null;
        const flashType = /*[[${messageType}]]*/ null;
        window.ecoAdmin.showFlashMessage(flashMessage, flashType);
    });
</script>

</body>
</html>
