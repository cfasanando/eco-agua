<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head_admin :: adminHead('Usuarios')"></head>
<body>
<div class="app-layout" th:with="activePage='admin_users'">
    <!-- Sidebar -->
    <aside th:replace="fragments/sidebar :: sidebar"></aside>

    <!-- Main content -->
    <div class="main-content">
        <!-- Topbar -->
        <header th:replace="fragments/topbar :: topbar"></header>

        <!-- Page content -->
        <main class="content-wrapper">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="h5 mb-0">Usuarios</h1>
                <button type="button"
                        class="btn btn-primary"
                        data-bs-toggle="modal"
                        data-bs-target="#userModal"
                        onclick="window.ecoUsers.openNewUserModal()">
                    <i class="bi bi-plus-circle me-1"></i> Agregar
                </button>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="table-responsive">
                        <table id="usersTable"
                               class="table table-striped table-hover align-middle datatable">
                            <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Usuario</th>
                                <th>Rol principal</th>
                                <th>Activo</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="u : ${users}" th:attr="data-user-id=${u.id}">
                                <td th:text="${u.id}">1</td>
                                <td th:text="${u.username}">admin</td>
                                <td>
                                    <span th:text="${#lists.isEmpty(u.roles) ? '-' : u.roles.iterator().next().title}">
                                        Administrador
                                    </span>
                                </td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${u.active} ? ' bg-success' : ' bg-secondary'"
                                          th:text="${u.active} ? 'Sí' : 'No'">
                                        Sí
                                    </span>
                                </td>
                                <td class="text-center">
                                    <button type="button"
                                            class="btn btn-sm btn-outline-primary js-edit-user"
                                            data-bs-toggle="modal"
                                            data-bs-target="#userModal">
                                        <i class="bi bi-pencil-square"></i>
                                    </button>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>
</div>

<!-- Common scripts -->
<th:block th:replace="fragments/scripts_admin :: adminScripts"></th:block>

<!-- Modal de usuario -->
<div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl">
        <div class="modal-content">
            <form th:action="@{/admin/users/save}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">Datos del usuario</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">

                    <input type="hidden" name="userId" id="userId"/>

                    <div class="row">
                        <!-- Datos de acceso -->
                        <div class="col-md-4 border-end">
                            <h6 class="mb-3">
                                <i class="bi bi-person-badge me-1"></i>Datos de acceso
                            </h6>

                            <div class="mb-3">
                                <label class="form-label">Usuario</label>
                                <input class="form-control" name="username" id="username" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Clave</label>
                                <input class="form-control" type="password" name="password" id="password">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Confirma la clave</label>
                                <input class="form-control" type="password" name="confirmPassword" id="confirmPassword">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Roles</label>
                                <select class="form-select" name="roleId" id="roleId" required>
                                    <option value="">- Seleccione -</option>
                                    <option th:each="r : ${roles}"
                                            th:value="${r.id}"
                                            th:text="${r.title}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <!-- Datos personales -->
                        <div class="col-md-4 border-end">
                            <h6 class="mb-3">
                                <i class="bi bi-person-lines-fill me-1"></i>Datos personales
                            </h6>

                            <div class="mb-3">
                                <label class="form-label">Nombres</label>
                                <input class="form-control" name="firstName" id="firstName">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Apellidos</label>
                                <input class="form-control" name="lastName" id="lastName">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Sexo</label>
                                <select class="form-select" name="gender" id="gender">
                                    <option value="">- Seleccione -</option>
                                    <option value="MALE">Masculino</option>
                                    <option value="FEMALE">Femenino</option>
                                    <option value="OTHER">Otro</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">F. nacido</label>
                                <input class="form-control" type="date" name="birthDate" id="birthDate">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Celular</label>
                                <input class="form-control" name="phone" id="phone">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">DNI</label>
                                <input class="form-control" name="dni" id="dni">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">E-mail</label>
                                <input class="form-control" type="email" name="email" id="email">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Dirección</label>
                                <textarea class="form-control" name="address" id="address" rows="2"></textarea>
                            </div>
                        </div>

                        <!-- Datos laborales -->
                        <div class="col-md-4">
                            <h6 class="mb-3">
                                <i class="bi bi-briefcase me-1"></i>Datos laborales
                            </h6>

                            <div class="mb-3">
                                <label class="form-label">Cargo</label>
                                <select class="form-select" name="jobPositionId" id="jobPositionId">
                                    <option value="">- Seleccione -</option>
                                    <option th:each="jp : ${jobPositions}"
                                            th:value="${jp.id}"
                                            th:text="${jp.displayName}">
                                    </option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Fecha de ingreso</label>
                                <input class="form-control" type="date" name="hireDate" id="hireDate">
                            </div>

                            <div class="form-check mt-3">
                                <input class="form-check-input" type="checkbox" name="active" id="active" checked>
                                <label class="form-check-label" for="active">
                                    Usuario activo
                                </label>
                            </div>
                        </div>
                    </div>

                </div>
                <div class="modal-footer">
                    <button type="button"
                            class="btn btn-outline-secondary"
                            data-bs-dismiss="modal">
                        Cancelar
                    </button>
                    <button type="submit"
                            class="btn btn-primary">
                        Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:inline="javascript">
    // Small helper for modal behavior
    window.ecoUsers = (function () {
        function clearForm() {
            const form = document.querySelector('#userModal form');
            if (!form) return;
            form.reset();
            const idInput = document.getElementById('userId');
            if (idInput) {
                idInput.value = '';
            }
            const active = document.getElementById('active');
            if (active) {
                active.checked = true;
            }
        }

        function fillFormFromRow(row) {
            if (!row) {
                return;
            }
            const id = row.getAttribute('data-user-id');
            const usernameCell = row.querySelector('td:nth-child(2)');
            const activeBadge = row.querySelector('td:nth-child(4) .badge');

            clearForm();

            if (id) {
                document.getElementById('userId').value = id;
            }
            if (usernameCell) {
                document.getElementById('username').value = usernameCell.textContent.trim();
            }
            if (activeBadge) {
                const isActive = activeBadge.classList.contains('bg-success');
                document.getElementById('active').checked = isActive;
            }
        }

        function bindEditButtons() {
            document.querySelectorAll('.js-edit-user').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    const row = this.closest('tr');
                    fillFormFromRow(row);
                });
            });
        }

        function openNewUserModal() {
            clearForm();
        }

        document.addEventListener('DOMContentLoaded', function () {
            bindEditButtons();
        });

        return {
            openNewUserModal: openNewUserModal
        };
    })();
</script>
</body>
</html>
