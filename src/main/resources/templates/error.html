<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error en la aplicación</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-4">
    <h1 class="h4 text-danger mb-3">Se produjo un error en el servidor</h1>

    <div class="mb-3">
        <strong>Estado:</strong>
        <span th:text="${status}">500</span> -
        <span th:text="${error}">Internal Server Error</span>
    </div>

    <div class="mb-3">
        <strong>Mensaje:</strong>
        <pre class="bg-white border rounded p-2 small"
             th:text="${message}">Mensaje de error</pre>
    </div>

    <div class="mb-3" th:if="${exception}">
        <strong>Excepción:</strong>
        <pre class="bg-white border rounded p-2 small"
             th:text="${exception}">java.lang.Exception...</pre>
    </div>

    <div class="mb-3" th:if="${trace}">
        <strong>Stacktrace:</strong>
        <pre class="bg-white border rounded p-2 small"
             style="max-height: 400px; overflow:auto;"
             th:text="${trace}">trace...</pre>
    </div>

    <a href="javascript:history.back()" class="btn btn-secondary btn-sm">Volver</a>
</div>
</body>
</html>
