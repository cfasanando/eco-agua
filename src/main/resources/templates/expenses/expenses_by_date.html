<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head_admin :: adminHead('Gastos por fecha - Eco Agua')"></head>

<body>
<div class="app-layout" th:with="activePage='expenses_by_date'">
    <!-- Sidebar -->
    <aside th:replace="fragments/sidebar :: sidebar"></aside>

    <!-- Main -->
    <div class="main-content">
        <!-- Topbar -->
        <header th:replace="fragments/topbar :: topbar"></header>

        <!-- Content -->
        <main class="content-wrapper">

            <!-- Título + botón agregar -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h1 class="h5 mb-0">Gastos por fecha</h1>
                    <div class="small text-muted">Listado de gastos por fecha</div>
                </div>

                <button type="button"
                        class="btn btn-primary"
                        data-bs-toggle="modal"
                        data-bs-target="#expenseModal">
                    <i class="bi bi-plus-circle me-1"></i>
                    Agregar un gasto
                </button>
            </div>

            <!-- Filtros -->
            <div class="card mb-3 shadow-sm">
                <div class="card-header bg-light">
                    <strong>Filtros :</strong>
                </div>
                <div class="card-body">

                    <form class="row g-2 align-items-end"
                          method="get"
                          th:action="@{/expenses/by-date}">

                        <!-- Tipo de filtro -->
                        <div class="col-md-3">
                            <label for="filterMode" class="form-label">Modo</label>
                            <select id="filterMode"
                                    name="filter"
                                    class="form-select">
                                <option value="DAY"
                                        th:selected="${filter}=='DAY'">Por día</option>
                                <option value="PERIOD"
                                        th:selected="${filter}=='PERIOD'">Por período</option>
                                <!-- El resto, por ahora, se comporta como DAY en el backend -->
                                <option value="DAILY"
                                        th:selected="${filter}=='DAILY'">Diarios</option>
                                <option value="WEEKLY"
                                        th:selected="${filter}=='WEEKLY'">Semanal</option>
                                <option value="BIWEEKLY"
                                        th:selected="${filter}=='BIWEEKLY'">Quincenal</option>
                                <option value="MONTHLY"
                                        th:selected="${filter}=='MONTHLY'">Mensual</option>
                                <option value="YEARLY"
                                        th:selected="${filter}=='YEARLY'">Anual</option>
                            </select>
                        </div>

                        <!-- Fecha única -->
                        <div class="col-md-3" id="singleDateWrapper">
                            <label for="filterDate" class="form-label">Fecha</label>
                            <input type="date"
                                   id="filterDate"
                                   name="date"
                                   class="form-control"
                                   th:value="${date}">
                        </div>

                        <!-- Desde / Hasta para períodos -->
                        <div class="col-md-3 d-none" id="fromDateWrapper">
                            <label for="fromDate" class="form-label">Desde</label>
                            <input type="date"
                                   id="fromDate"
                                   name="from"
                                   class="form-control"
                                   th:value="${fromDate}">
                        </div>

                        <div class="col-md-3 d-none" id="toDateWrapper">
                            <label for="toDate" class="form-label">Hasta</label>
                            <input type="date"
                                   id="toDate"
                                   name="to"
                                   class="form-control"
                                   th:value="${toDate}">
                        </div>

                        <div class="col-md-3">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-search me-1"></i>
                                Buscar
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Resultado -->
            <div class="card shadow-sm">
                <div class="card-body">

                    <!-- Cuando hay datos -->
                    <div th:if="${expenses != null and !#lists.isEmpty(expenses)}">
                        <div class="table-responsive">
                            <table class="table table-sm align-middle mb-0">
                                <thead class="table-light">
                                <tr>
                                    <th>Fecha</th>
                                    <th>Categoría</th>
                                    <th>Observación</th>
                                    <th class="text-end">Monto S/.</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="e : ${expenses}">
                                    <td th:text="${#temporals.format(e.expenseDate, 'dd/MM/yyyy')}">23/11/2025</td>
                                    <td th:text="${e.category != null ? e.category.name : '-'}">Categoría</td>
                                    <td th:text="${e.observation}">Observación</td>
                                    <td class="text-end"
                                        th:text="${#numbers.formatDecimal(e.amount,1,'POINT',2,'POINT')}">
                                        0.00
                                    </td>
                                </tr>
                                </tbody>
                                <tfoot>
                                <tr>
                                    <th colspan="3" class="text-end">TOTAL</th>
                                    <th class="text-end"
                                        th:text="${#numbers.formatDecimal(totalAmount,1,'POINT',2,'POINT')}">
                                        0.00
                                    </th>
                                </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>

                    <!-- Cuando no hay datos -->
                    <div class="alert alert-light mb-0 text-center"
                         th:if="${expenses == null or #lists.isEmpty(expenses)}">
                        <span th:text="${emptyMessage != null ? emptyMessage : 'No hay gastos en las fechas seleccionadas.'}">
                            No hay gastos en las fechas seleccionadas.
                        </span>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Scripts comunes -->
<th:block th:replace="fragments/scripts_admin :: adminScripts"></th:block>

<!-- Modal: Agregar gasto -->
<div class="modal fade" id="expenseModal" tabindex="-1" aria-labelledby="expenseModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <!-- IMPORTANTE: aquí cambiamos la acción -->
            <form th:action="@{/expenses/save-simple}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title" id="expenseModalLabel">Agrega un gasto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}"/>

                    <!-- Para volver a esta misma página después de guardar -->
                    <input type="hidden" name="redirect" value="BY_DATE"/>

                    <div class="mb-3">
                        <label class="form-label">Categoría</label>
                        <select class="form-select"
                                name="categoryId"
                                id="expenseCategoryId"
                                required>
                            <option value="">- Seleccione -</option>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}">
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Costo S/.</label>
                        <input type="number"
                               class="form-control"
                               name="amount"
                               min="0"
                               step="0.01"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Observación</label>
                        <textarea class="form-control"
                                  name="observation"
                                  rows="2"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Fecha</label>
                        <input type="date"
                               class="form-control"
                               name="expenseDate"
                               th:value="${date}">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">
                        Cancelar
                    </button>
                    <button type="submit"
                            class="btn btn-primary">
                        Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- JS específico: manejo de filtros + flash -->
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function () {
        'use strict';

        const modeSelect = document.getElementById('filterMode');
        const singleDateWrapper = document.getElementById('singleDateWrapper');
        const fromDateWrapper = document.getElementById('fromDateWrapper');
        const toDateWrapper = document.getElementById('toDateWrapper');

        function updateDateFieldsVisibility() {
            if (!modeSelect) {
                return;
            }
            const mode = modeSelect.value;

            // PERIOD usa desde/hasta; el resto usa fecha única
            if (mode === 'PERIOD') {
                singleDateWrapper.classList.add('d-none');
                fromDateWrapper.classList.remove('d-none');
                toDateWrapper.classList.remove('d-none');
            } else {
                singleDateWrapper.classList.remove('d-none');
                fromDateWrapper.classList.add('d-none');
                toDateWrapper.classList.add('d-none');
            }
        }

        if (modeSelect) {
            modeSelect.addEventListener('change', updateDateFieldsVisibility);
            updateDateFieldsVisibility();
        }

        // Flash messages
        const flashMessage = /*[[${message}]]*/ null;
        const flashType = /*[[${messageType}]]*/ null;
        if (flashMessage && flashMessage !== 'null' && flashMessage !== '') {
            if (window.ecoAdmin && typeof window.ecoAdmin.showFlashMessage === 'function') {
                window.ecoAdmin.showFlashMessage(flashMessage, flashType);
            } else {
                alert(flashMessage);
            }
        }
    });
</script>

</body>
</html>
