<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head_admin :: adminHead('Cuentas por cobrar - Eco Agua')"></head>
<body>

<div class="app-layout" th:with="activePage='income_credit'">
    <aside th:replace="fragments/sidebar :: sidebar"></aside>

    <div class="main-content">
        <header th:replace="fragments/topbar :: topbar"></header>

        <main class="content-wrapper">

            <h1 class="h5 mb-3">Cuentas x cobrar (Fiados)</h1>

            <!-- Filtros -->
            <div class="card shadow-sm mb-3">
                <div class="card-header bg-light">
                    <strong>Por período :</strong>
                </div>
                <div class="card-body">
                    <form class="row g-2 align-items-end"
                          th:action="@{/income/credit}"
                          method="get">

                        <div class="col-md-4">
                            <label class="form-label">Desde</label>
                            <input type="date"
                                   class="form-control"
                                   name="startDate"
                                   th:value="${startDate}">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Hasta</label>
                            <input type="date"
                                   class="form-control"
                                   name="endDate"
                                   th:value="${endDate}">
                        </div>

                        <div class="col-md-2">
                            <button type="submit"
                                    class="btn btn-primary w-100">
                                <i class="bi bi-search"></i> Buscar
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Resultados -->
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    Listado de pedidos por cobrar (estado: CREDIT)
                </div>
                <div class="card-body">

                    <div class="table-responsive">
                        <table class="table table-striped table-sm align-middle">
                            <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Fecha</th>
                                <th>Cliente</th>
                                <th class="text-end">Total S/.</th>
                                <th>Días</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="o, stat : ${orders}">
                                <td th:text="${stat.count}">1</td>
                                <td th:text="${#temporals.format(o.orderDate,'dd/MM/yyyy')}">23/11/2025</td>
                                <td th:text="${o.client != null ? o.client.name : '-'}">Cliente</td>
                                <td class="text-end"
                                    th:text="${#numbers.formatDecimal(o.totalAmount,1,'POINT',2,'POINT')}">
                                    0.00
                                </td>
                                <td th:text="${T(java.time.temporal.ChronoUnit).DAYS.between(o.orderDate, T(java.time.LocalDate).now())}">
                                    0
                                </td>
                                <td class="text-center">
                                    <!-- Ver -->
                                    <a th:href="@{|/orders/${o.id}|}"
                                       class="btn btn-sm btn-outline-secondary me-1">
                                        Ver
                                    </a>

                                    <!-- Marcar como pagado -->
                                    <form th:action="@{|/orders/${o.id}/pay|}"
                                          method="post"
                                          class="d-inline">
                                        <input type="hidden"
                                               th:name="${_csrf.parameterName}"
                                               th:value="${_csrf.token}"/>
                                        <button type="submit"
                                                class="btn btn-sm btn-success">
                                            Pagar
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(orders)}">
                                <td colspan="6" class="text-center text-muted">
                                    No hay ventas en las fechas seleccionadas (fiados).
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="d-flex justify-content-end mt-2">
                        <div class="fw-bold">
                            Total pendiente:&nbsp;
                            <span th:text="${#numbers.formatDecimal(totalAmount,1,'POINT',2,'POINT')}">0.00</span> S/.
                        </div>
                    </div>

                </div>
            </div>

        </main>
    </div>
</div>

<th:block th:replace="fragments/scripts_admin :: adminScripts"></th:block>

</body>
</html>
