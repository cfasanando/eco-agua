<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head_admin :: adminHead('Otros ingresos - Eco Agua')"></head>
<body>

<div class="app-layout" th:with="activePage='income_others'">
    <aside th:replace="fragments/sidebar :: sidebar"></aside>

    <div class="main-content">
        <header th:replace="fragments/topbar :: topbar"></header>

        <main class="content-wrapper">

            <h1 class="h5 mb-1">Otros ingresos</h1>
            <p class="text-muted small mb-3">
                Otros ingresos, préstamos, actividades, entre otros.
            </p>

            <!-- Filtros -->
            <div class="card shadow-sm mb-3">
                <div class="card-header bg-light">
                    <strong>Por período :</strong>
                </div>
                <div class="card-body">
                    <form class="row g-2 align-items-end"
                          th:action="@{/income/others}"
                          method="get">

                        <div class="col-md-4">
                            <label class="form-label">Desde</label>
                            <input type="date"
                                   class="form-control"
                                   name="startDate"
                                   th:value="${startDate}">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Hasta</label>
                            <input type="date"
                                   class="form-control"
                                   name="endDate"
                                   th:value="${endDate}">
                        </div>

                        <div class="col-md-2">
                            <button type="submit"
                                    class="btn btn-primary w-100">
                                <i class="bi bi-search"></i> Buscar
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Tabla -->
            <div class="card shadow-sm">
                <div class="card-body">

                    <div class="d-flex justify-content-between mb-2">
                        <div>
                            <button type="button"
                                    class="btn btn-danger btn-sm"
                                    onclick="document.getElementById('deleteIncomeForm').submit();">
                                <i class="bi bi-trash"></i> Borrar
                            </button>
                        </div>
                        <div>
                            <button type="button"
                                    class="btn btn-primary btn-sm"
                                    data-bs-toggle="modal"
                                    data-bs-target="#otherIncomeModal">
                                <i class="bi bi-plus-circle"></i> Agregar
                            </button>
                        </div>
                    </div>

                    <form id="deleteIncomeForm"
                          th:action="@{/income/others/delete}"
                          method="post">
                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>

                        <input type="hidden" name="startDate" th:value="${startDate}"/>
                        <input type="hidden" name="endDate" th:value="${endDate}"/>

                        <div class="table-responsive">
                            <table class="table table-striped table-sm align-middle">
                                <thead class="table-light">
                                <tr>
                                    <th style="width: 40px;">
                                        <input type="checkbox"
                                               id="chkAll"
                                               onclick="toggleAllIncomes(this)">
                                    </th>
                                    <th>Categoría</th>
                                    <th>Observación</th>
                                    <th class="text-end">Monto S/.</th>
                                    <th>Fecha</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="inc : ${incomes}">
                                    <td>
                                        <input type="checkbox"
                                               name="ids"
                                               th:value="${inc.id}">
                                    </td>
                                    <td th:text="${inc.category != null ? inc.category.name : '-'}">
                                        Categoria
                                    </td>
                                    <td th:text="${inc.observation}">Obs</td>
                                    <td class="text-end"
                                        th:text="${#numbers.formatDecimal(inc.amount,1,'POINT',2,'POINT')}">
                                        0.00
                                    </td>
                                    <td th:text="${#temporals.format(inc.incomeDate, 'dd/MM/yyyy')}">
                                        23/11/2025
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(incomes)}">
                                    <td colspan="5" class="text-center text-muted">
                                        No hay datos en el período seleccionado.
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </form>

                    <div class="d-flex justify-content-end mt-2">
                        <div class="fw-bold">
                            Total:&nbsp;
                            <span th:text="${#numbers.formatDecimal(totalAmount,1,'POINT',2,'POINT')}">
                                0.00
                            </span> S/.
                        </div>
                    </div>

                </div>
            </div>

        </main>
    </div>
</div>

<th:block th:replace="fragments/scripts_admin :: adminScripts"></th:block>

<script th:inline="javascript">
    function toggleAllIncomes(source) {
        const checkboxes = document.querySelectorAll('#deleteIncomeForm input[name="ids"]');
        checkboxes.forEach(function (cb) {
            cb.checked = source.checked;
        });
    }

    document.addEventListener('DOMContentLoaded', function () {
        const flashMessage = /*[[${message}]]*/ null;
        const flashType = /*[[${messageType}]]*/ null;

        if (flashMessage && flashMessage !== 'null' && flashMessage !== '') {
            if (window.ecoAdmin && typeof window.ecoAdmin.showFlashMessage === 'function') {
                window.ecoAdmin.showFlashMessage(flashMessage, flashType);
            } else {
                alert(flashMessage);
            }
        }
    });
</script>

<!-- Modal para agregar ingreso -->
<div class="modal fade" id="otherIncomeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/income/others}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">Agrega ingreso</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"
                            aria-label="Close"></button>
                </div>
                <div class="modal-body">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}"/>

                    <div class="mb-3">
                        <label class="form-label">Categoría</label>
                        <select class="form-select" name="categoryId" required>
                            <option value="">- Seleccione -</option>
                            <option th:each="cat : ${incomeCategories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}">
                                Categoria
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Costo S/.</label>
                        <input type="number"
                               class="form-control"
                               name="amount"
                               min="0"
                               step="0.01"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Fecha</label>
                        <input type="date"
                               class="form-control"
                               name="incomeDate"
                               th:value="${endDate}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Observación</label>
                        <textarea class="form-control"
                                  name="observation"
                                  rows="2"></textarea>
                    </div>

                </div>
                <div class="modal-footer">
                    <button type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">
                        Cancelar
                    </button>
                    <button type="submit"
                            class="btn btn-success">
                        Añadir
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
