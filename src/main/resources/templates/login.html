<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Eco Agua - Acceso</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- Nuestro CSS -->
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div class="login-bg"></div>
<div class="login-overlay"></div>

<div class="login-card">

    <!-- Logo -->
    <div class="login-logo-circle">
        <img th:src="@{/img/logo-eco.png}" alt="Eco del Amazonas">
    </div>

    <h1 class="login-title">Acceso</h1>

    <!-- Mensajes de error / logout -->
    <div th:if="${param.error}" class="alert alert-danger py-1 mb-2 small">
        Usuario o contraseña incorrectos.
    </div>
    <div th:if="${param.logout}" class="alert alert-success py-1 mb-2 small">
        Has cerrado sesión correctamente.
    </div>

    <form th:action="@{/login}" method="post" autocomplete="off">
        <!-- CSRF token -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="mb-3">
            <label for="username" class="form-label">DNI</label>
            <input id="username" name="username" type="text" class="form-control"
                   placeholder="Ingresa tu DNI" required>
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input id="password" name="password" type="password" class="form-control"
                   placeholder="Ingresa tu contraseña" required>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check">
                <input id="remember-me" name="remember-me" class="form-check-input" type="checkbox">
                <label class="form-check-label" for="remember-me">
                    Recordarme
                </label>
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-login">
            Acceder
        </button>

        <div class="d-flex justify-content-between align-items-center mt-3 login-footer-links">
            <span></span>
            <a href="#">¿Olvidaste tu contraseña?</a>
        </div>
    </form>
</div>

</body>
</html>
