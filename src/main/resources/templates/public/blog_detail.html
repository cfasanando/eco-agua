<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head_public :: publicHead(${post.title} + ' - Blog Eco Agua')}"></head>

<body>
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center" th:href="@{/}">
            <img th:src="@{/img/logo3-transparente.png}" alt="Eco Agua" height="40" class="me-2">
            <span>
                <span class="d-block brand-title">Eco del Amazonas</span>
                <span class="d-block brand-subtitle">Agua de mesa</span>
            </span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#mainNavbar" aria-controls="mainNavbar"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/catalogo}">Catálogo</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/blog}">Blog</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="bg-light">
    <section class="py-5">
        <div class="container">
            <div class="mb-3">
                <a th:href="@{/blog}" class="small text-decoration-none">
                    ← Volver al blog
                </a>
            </div>

            <article class="bg-white rounded-4 shadow-sm p-4 p-md-5">
                <header class="mb-4">
                    <p class="text-uppercase small text-primary mb-1">Blog • Consejos de hidratación</p>
                    <h1 class="h3 mb-2" th:text="${post.title}">Título del artículo</h1>
                    <p class="small text-muted mb-0"
                       th:if="${post.publishedAt != null}">
                        Publicado el
                        <span th:text="${#temporals.format(post.publishedAt, 'dd/MM/yyyy')}">01/01/2024</span>
                    </p>
                </header>

                <div class="mb-4" th:if="${post.coverImagePath != null}">
                    <img th:src="@{${post.coverImagePath}}"
                         th:alt="${post.title}"
                         class="img-fluid rounded-3">
                </div>

                <div class="article-content">
                    <!-- Content is stored as HTML, so we use utext -->
                    <div th:utext="${post.content}">
                        Contenido del artículo...
                    </div>
                </div>
            </article>
        </div>
    </section>
</main>

<footer class="border-top py-3 bg-white">
    <div class="container d-flex flex-wrap justify-content-between align-items-center small text-muted">
        <span>© <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy')}">2024</span> Eco del Amazonas - Agua de mesa</span>
        <span>Servicio de agua purificada a domicilio - Iquitos, Perú</span>
    </div>
</footer>

<script th:src="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
