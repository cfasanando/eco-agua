<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head_admin :: adminHead('Movimientos de producto - Eco Agua')"></head>

<body>

<div class="app-layout" th:with="activePage='warehouse_products_stock'">
    <aside th:replace="fragments/sidebar :: sidebar"></aside>

    <div class="main-content">
        <header th:replace="fragments/topbar :: topbar"></header>

        <main class="content-wrapper">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="h5 mb-0">
                    Detalle entrada/salida (Stock):
                    <span th:text="${product.name}">Producto</span>
                </h1>

                <a th:href="@{/warehouse/products-stock}"
                   class="btn btn-outline-secondary btn-sm">
                    Volver
                </a>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <table class="table table-striped table-sm align-middle">
                        <thead class="table-light">
                        <tr>
                            <th>Observación</th>
                            <th class="text-end">Entrada</th>
                            <th class="text-end">Salida</th>
                            <th>Tipo</th>
                            <th>Fecha</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="mov : ${movements}">
                            <td th:text="${mov.observation}">Obs</td>
                            <td class="text-end"
                                th:text="${#numbers.formatDecimal(mov.quantityIn,1,'POINT',2,'POINT')}">
                                0.00
                            </td>
                            <td class="text-end"
                                th:text="${#numbers.formatDecimal(mov.quantityOut,1,'POINT',2,'POINT')}">
                                0.00
                            </td>
                            <td th:text="${mov.movementType}">TYPE</td>
                            <td th:text="${#temporals.format(mov.movementDate, 'yyyy-MM-dd HH:mm:ss')}">
                                2025-01-01
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>

<th:block th:replace="fragments/scripts_admin :: adminScripts"></th:block>

</body>
</html>
