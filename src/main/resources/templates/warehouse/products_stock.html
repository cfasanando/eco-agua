<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head_admin :: adminHead('Stock de productos - Eco Agua')"></head>

<body>

<div class="app-layout" th:with="activePage='warehouse_products_stock'">
    <!-- Sidebar -->
    <aside th:replace="fragments/sidebar :: sidebar"></aside>

    <!-- Main -->
    <div class="main-content">
        <!-- Topbar -->
        <header th:replace="fragments/topbar :: topbar"></header>

        <!-- Content -->
        <main class="content-wrapper">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="h5 mb-0">Stock de productos</h1>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <table id="productsStockTable"
                           class="table table-striped table-sm align-middle"
                           style="width:100%">
                        <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Foto</th>
                            <th>Descripción</th>
                            <th>Categoría</th>
                            <th>Medida</th>
                            <th class="text-end">Stock</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="product, stat : ${products}">
                            <td th:text="${stat.index + 1}">1</td>

                            <td>
                                <img th:if="${product.imagePath != null}"
                                     th:src="${product.imagePath}"
                                     alt="Foto"
                                     class="img-thumbnail"
                                     style="max-height: 40px;">
                                <span th:if="${product.imagePath == null}"
                                      class="text-muted small">Sin foto</span>
                            </td>

                            <td th:text="${product.name}">Descripción</td>

                            <td th:text="${product.category != null ? product.category.name : '-'}">Categoría</td>

                            <!-- If you later add unit to product, replace 'unidad' -->
                            <td>unidad</td>

                            <td class="text-end"
                                th:text="${#numbers.formatDecimal(product.stock,1,'POINT',2,'POINT')}">
                                0.00
                            </td>

                            <td class="text-center">
                                <!-- Adjust stock -->
                                <button type="button"
                                        class="btn btn-sm btn-outline-primary me-1"
                                        data-bs-toggle="modal"
                                        data-bs-target="#adjustProductStockModal"
                                        th:attr="data-id=${product.id},
                                                 data-name=${product.name},
                                                 data-stock=${product.stock}">
                                    <i class="bi bi-calculator"></i>
                                </button>

                                <!-- Movements -->
                                <a th:href="@{'/warehouse/products-stock/' + ${product.id} + '/movements'}"
                                   class="btn btn-sm btn-outline-secondary"
                                   title="Ver movimientos">
                                    <i class="bi bi-chevron-double-right"></i>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>

<!-- Modal adjust stock -->
<div class="modal fade" id="adjustProductStockModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form id="adjustProductStockForm"
                  th:action="@{/warehouse/products-stock/adjust}"
                  method="post">
                <div class="modal-header">
                    <h5 class="modal-title">Ajustar stock</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"
                            aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="productId" id="apsProductId"/>

                    <div class="mb-3">
                        <label class="form-label">Producto</label>
                        <input type="text" class="form-control" id="apsProductName" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Stock actual</label>
                        <input type="text" class="form-control" id="apsCurrentStock" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Cantidad</label>
                        <input type="number" step="0.01" min="0"
                               class="form-control"
                               name="quantity"
                               id="apsQuantity"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Fecha</label>
                        <input type="date"
                               class="form-control"
                               name="movementDate"
                               id="apsMovementDate"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Observación</label>
                        <textarea class="form-control"
                                  name="observation"
                                  id="apsObservation"
                                  rows="2"></textarea>
                    </div>

                    <input type="hidden" name="action" id="apsAction" value="IN">
                </div>
                <div class="modal-footer">
                    <button type="button"
                            class="btn btn-success btn-sm"
                            onclick="window.ecoWarehouse.submitProductStockForm('IN')">
                        <i class="bi bi-plus-circle"></i> Agregar
                    </button>
                    <button type="button"
                            class="btn btn-danger btn-sm"
                            onclick="window.ecoWarehouse.submitProductStockForm('OUT')">
                        <i class="bi bi-dash-circle"></i> Quitar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Scripts comunes -->
<th:block th:replace="fragments/scripts_admin :: adminScripts"></th:block>

<!-- JS específico -->
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function () {
        'use strict';

        // DataTable for products stock
        window.ecoAdmin.initStandardDataTable('#productsStockTable', []);

        const adjustModal = document.getElementById('adjustProductStockModal');
        const form = document.getElementById('adjustProductStockForm');

        const inputId = document.getElementById('apsProductId');
        const inputName = document.getElementById('apsProductName');
        const inputCurrentStock = document.getElementById('apsCurrentStock');
        const inputQuantity = document.getElementById('apsQuantity');
        const inputDate = document.getElementById('apsMovementDate');
        const inputObs = document.getElementById('apsObservation');

        if (!window.ecoWarehouse) {
            window.ecoWarehouse = {};
        }

        window.ecoWarehouse.submitProductStockForm = function (action) {
            document.getElementById('apsAction').value = action;
            form.submit();
        };

        if (adjustModal) {
            adjustModal.addEventListener('show.bs.modal', function (event) {
                const button = event.relatedTarget;
                if (!button) {
                    return;
                }

                const id = button.getAttribute('data-id');
                const name = button.getAttribute('data-name') || '';
                const stock = button.getAttribute('data-stock') || '0.00';

                adjustModal.querySelector('.modal-title').textContent =
                    'Ajustar stock: ' + name;

                inputId.value = id;
                inputName.value = name;
                inputCurrentStock.value = stock;
                inputQuantity.value = '';
                inputObs.value = '';

                const today = new Date().toISOString().substring(0, 10);
                inputDate.value = today;
            });
        }

        // Flash message
        const flashMessage = /*[[${message}]]*/ null;
        const flashType = /*[[${messageType}]]*/ null;
        if (flashMessage && flashMessage !== 'null' && flashMessage !== '') {
            window.ecoAdmin.showFlashMessage(flashMessage, flashType);
        }
    });
</script>

</body>
</html>
